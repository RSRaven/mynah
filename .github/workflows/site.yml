name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      # npm install (not ci): the lockfile is generated on Windows and omits sharp's
      # Linux-only optional deps, which makes `npm ci` fail on the ubuntu runner.
      - run: npm install --no-audit --no-fund
      - name: Build with Astro
        run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
